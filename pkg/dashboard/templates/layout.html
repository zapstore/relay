{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zapstore Dashboard</title>
  <link rel="stylesheet" href="/static/theme.css">
  <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
  <script src="/static/chart.min.js"></script>
  <script src="/static/charts.js"></script>
</head>
<body>

<header>
  <span class="logo">
    <img src="/static/assets/zapstore-logo.svg" alt="" height="24">
    Zapstore
  </span>
  <nav id="tabs">
    <button class="tab active"
      hx-get="/tabs/relay"
      hx-target="#content"
      hx-swap="innerHTML"
      onclick="setActive(this)">Relay</button>
    <button class="tab"
      hx-get="/tabs/blossom"
      hx-target="#content"
      hx-swap="innerHTML"
      onclick="setActive(this)">Blossom</button>
    <button class="tab"
      hx-get="/tabs/apps"
      hx-target="#content"
      hx-swap="innerHTML"
      onclick="setActive(this)">Apps</button>
    <button class="tab"
      hx-get="/tabs/defender"
      hx-target="#content"
      hx-swap="innerHTML"
      onclick="setActive(this)">Defender</button>
  </nav>
</header>

<main>
  <div id="content" hx-get="/tabs/relay" hx-trigger="load" hx-swap="innerHTML">
  </div>
</main>



  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--background);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 0 1.5rem;
      height: 64px;
      background: var(--background);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: var(--text-normal);
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.01em;
      white-space: nowrap;
    }
    .logo img { display: block; }

    /* ── Tab nav ── */
    nav { display: flex; gap: 0.125rem; }

    .tab {
      background: none;
      border: none;
      color: var(--text-muted);
      padding: 0.375rem 0.875rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: var(--text-normal);
      font-family: inherit;
      transition: background 0.12s, color 0.12s;
    }
    .tab:hover  { background: var(--surface); color: var(--text); }
    .tab.active { background: var(--surface); color: var(--text); font-weight: 600; }

    /* ── Main content ── */
    main { padding: 1.75rem 1.5rem; max-width: 1200px; margin: 0 auto; }

    /* ── Section titles ── */
    .section-title {
      font-size: var(--text-title);
      font-weight: 700;
      color: var(--text);
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .section-subtitle {
      font-size: var(--text-normal);
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 2.5rem;
    }

    /* ── Placeholder block ── */
    .placeholder {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3rem 2rem;
      text-align: center;
      color: var(--text-muted);
      font-size: var(--text-normal);
    }
    .placeholder strong { display: block; margin-bottom: 0.375rem; color: var(--text); font-size: var(--text-normal); }

    /* ── HTMX loading indicator ── */
    .htmx-indicator { opacity: 0; transition: opacity 0.2s; }
    .htmx-request .htmx-indicator { opacity: 1; }
  </style>

<script>
  function setActive(el) {
    document.querySelectorAll('#tabs .tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
  }
</script>

</body>
</html>
{{end}}
